name: RSS Feed Monitor

on:
  schedule:
    - cron: '*/5 13-22 * * 1-5'    # every 5 min, 9 AM–6 PM ET (Mon–Fri)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss
  cancel-in-progress: false

jobs:
  rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check RSS feeds
        env:
          TEAMS_DEV_WEBHOOK_URL: ${{ secrets.TEAMS_DEV_WEBHOOK_URL }}
        run: node rss.js

      - name: Commit seen links
        run: |
          git config user.name "Zura Bio CI Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_links_rss.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" || (git pull --no-rebase -X ours origin main && git commit -m "RSS seen links $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git push)
